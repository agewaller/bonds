# 定期処理 (cares outreach-sweep.yml 相当)。1 時間ごとに:
# 1) process-queue — 送信予定時刻を過ぎた承認済みメッセージを送る
# 2) refresh-digests — 新しい記録が積まれた連絡先の「相手ノート (見立て)」を自動更新する
#    (web 検索はしない。月次キャップはサーバ側が守る)
# 3) partners/process-queue — 提携先アウトリーチの承認済みメールを日次上限の範囲で送る
# 必要な設定: Variables BONDS_API_URL / Secrets BONDS_ADMIN_TOKEN (break-glass)。
# 未設定ならジョブは何もせず成功する (グリーンに見せかけないよう notice を出す)。
name: outreach-sweep

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - name: process queue
        run: |
          if [ -z "${{ vars.BONDS_API_URL }}" ] || [ -z "${{ secrets.BONDS_ADMIN_TOKEN }}" ]; then
            echo "::notice::BONDS_API_URL / BONDS_ADMIN_TOKEN 未設定のためスキップ (本番デプロイ後に設定)"
            exit 0
          fi
          curl -fsS -X POST "${{ vars.BONDS_API_URL }}/api/admin/outreach/process-queue?batch=10" \
            -H "x-admin-token: ${{ secrets.BONDS_ADMIN_TOKEN }}"
          curl -fsS -X POST "${{ vars.BONDS_API_URL }}/api/admin/contacts/refresh-digests?batch=5" \
            -H "x-admin-token: ${{ secrets.BONDS_ADMIN_TOKEN }}"
          curl -fsS -X POST "${{ vars.BONDS_API_URL }}/api/admin/partners/process-queue?batch=10" \
            -H "x-admin-token: ${{ secrets.BONDS_ADMIN_TOKEN }}"
          # Google 連携: つながっている人を古い順に少しずつ同期 (受動収集)
          curl -fsS -X POST "${{ vars.BONDS_API_URL }}/api/admin/google/sync-all?batch=3" \
            -H "x-admin-token: ${{ secrets.BONDS_ADMIN_TOKEN }}"
          # 取り込みジョブのバックストップ: ユーザーが全部閉じても残った待ち行列を処理する
          curl -fsS -X POST "${{ vars.BONDS_API_URL }}/api/admin/contacts/process-import-jobs?batch=20" \
            -H "x-admin-token: ${{ secrets.BONDS_ADMIN_TOKEN }}"
          # 取り込んだばかりの方の論点整理を自動で進める (材料のある方だけ・web 検索なし・キャップ対応)
          curl -fsS -X POST "${{ vars.BONDS_API_URL }}/api/admin/contacts/enrich-imports?batch=5" \
            -H "x-admin-token: ${{ secrets.BONDS_ADMIN_TOKEN }}"
          # 名寄せの自動実行 (メール/電話が一致する「同じ人」を黙ってまとめる。名前だけの一致は提案に留める)
          curl -fsS -X POST "${{ vars.BONDS_API_URL }}/api/admin/contacts/auto-merge?batch=50" \
            -H "x-admin-token: ${{ secrets.BONDS_ADMIN_TOKEN }}"
          # 時間の予約の取りこぼし再照合 (支払い済みの確定漏れを拾い、期限切れは枠を開放する)
          curl -fsS -X POST "${{ vars.BONDS_API_URL }}/api/admin/schedule/reconcile-bookings?batch=20" \
            -H "x-admin-token: ${{ secrets.BONDS_ADMIN_TOKEN }}"
          # 優先度に基づく自動ケア (優先リスト上位の方への提案の受け箱 + 材料の自動整理)
          curl -fsS -X POST "${{ vars.BONDS_API_URL }}/api/admin/relationship/priority-care?batch=5" \
            -H "x-admin-token: ${{ secrets.BONDS_ADMIN_TOKEN }}"
          # 相手の SNS・公開情報を自律的に定期更新 (SNS/所属先のある方だけ・7日空け・月次キャップ・
          # Tavily 未設定なら 503 で何もしない)。相手の尊厳: 手がかりの無い方は自動検索しない
          curl -fsS -X POST "${{ vars.BONDS_API_URL }}/api/admin/contacts/refresh-public?batch=3" \
            -H "x-admin-token: ${{ secrets.BONDS_ADMIN_TOKEN }}" || true
          # 一斉配信 (お便り): 承認済みの配信を日次上限の範囲で少しずつ送る (配信停止・メール無しは skip)
          curl -fsS -X POST "${{ vars.BONDS_API_URL }}/api/admin/campaigns/process?batch=100" \
            -H "x-admin-token: ${{ secrets.BONDS_ADMIN_TOKEN }}" || true
